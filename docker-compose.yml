version: "3.9"

services:
  postgres:
    image: postgres:12
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nakama:
    image: heroiclabs/nakama:3.38.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/nakama/data/modules
    command:
      [
        "--name", "nakama1",
        "--database.address", "postgres:localdb@postgres:5432/nakama"
      ]
    ports:
      - "7350:7350"   # API
      - "7351:7351"   # Console
    restart: unless-stopped

volumes:
  pgdata: