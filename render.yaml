databases:
  - name: nakama-db
    databaseName: nakama
    user: nakama
    plan: free

services:
  - type: web
    name: nakama-server
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nakama-db
          property: connectionString
